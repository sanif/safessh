<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" width="1080" height="540">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <style>
      .term { font-family: 'Fira Code', 'JetBrains Mono', 'SF Mono', monospace; font-size: 16px; }
      .b { font-weight: 700; }
      .fg { fill: #e2e8f0; }
      .dim { fill: #64748b; }
      .cy { fill: #22d3ee; }
      .vio { fill: #a78bfa; }
      .gn { fill: #4ade80; }
      .ye { fill: #fbbf24; }
      .rd { fill: #f87171; }
      .or { fill: #fb923c; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="1080" height="540" rx="12" fill="#0c1425"/>
  <rect width="1080" height="32" rx="12" fill="url(#hdr)"/>
  <rect y="20" width="1080" height="14" fill="url(#hdr)"/>
  <circle cx="20" cy="16" r="6" fill="#ef4444"/>
  <circle cx="40" cy="16" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="16" r="6" fill="#22c55e"/>
  <text x="540" y="21" class="term dim" text-anchor="middle" font-size="13">claude-code  ·  /Volumes/External/.../api</text>

  <!-- Terminal lines -->
  <g class="term" transform="translate(28,68)">
    <text class="cy b">$ </text><text x="20" class="fg">claude</text><text x="100" class="dim">— in the api project</text>

    <text y="38" class="vio">claude</text><text x="68" y="38" class="fg">› </text><text x="92" y="38" class="dim">deploy the latest build to prod</text>

    <text y="76" class="dim">… runs</text><text x="80" y="76" class="cy">safessh prod exec "rsync -av build/ /srv/app/"</text>

    <text y="116" class="rd b">BLOCKED:</text><text x="100" y="116" class="fg">approval required</text>
    <text y="142" class="dim">  category   </text><text x="120" y="142" class="ye">filesystem:write</text>
    <text y="164" class="dim">  reason     </text><text x="120" y="164" class="fg">rsync writes outside the allow list</text>
    <text y="186" class="dim">  token      </text><text x="120" y="186" class="vio">ABC-7K2</text>

    <text y="218" class="fg b">› To approve, in another shell:</text>
    <text y="244" class="cy">  safessh approve ABC-7K2</text>
    <text y="266" class="dim">                ─ once ─ timed 30m ─ always ─ block</text>

    <text y="306" class="dim">[after you approve…]</text>

    <text y="334" class="fg">&lt;stdout&gt;</text>
    <text y="356" class="gn">  build/index.html → /srv/app/index.html  (12 KB)</text>
    <text y="378" class="gn">  build/app.js     → /srv/app/app.js      (482 KB)</text>
    <text y="400" class="fg">&lt;/stdout&gt;</text>
    <text y="426" class="dim">&lt;exit code="0" duration="312ms"/&gt;</text>

    <text y="464" class="vio">claude</text><text x="68" y="464" class="fg">› </text><text x="92" y="464" class="dim">Done — 2 files synced. 494 KB total.</text>
  </g>
</svg>
